<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>港股打新日历</title>
<style>
:root {
  --red: #E53935; --red-bg: #FFEBEE;
  --blue: #1E88E5; --blue-bg: #E3F2FD;
  --orange: #FB8C00; --orange-bg: #FFF3E0;
  --purple: #8E24AA; --purple-bg: #F3E5F5;
  --gray: #616161; --gray-bg: #F5F5F5;
  --bg: #F8F9FA; --card: #FFFFFF; --text: #212121; --sub: #757575;
  --border: #E0E0E0;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;min-height:100vh}

.header{background:var(--card);padding:16px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.header-top{display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:18px;font-weight:700}
.header .sub{font-size:12px;color:var(--sub);margin-top:2px}
.header .avatar{width:44px;height:44px;border-radius:12px;object-fit:cover;box-shadow:0 2px 6px rgba(0,0,0,.12);flex-shrink:0}
.nav-row{display:flex;align-items:center;justify-content:space-between;margin-top:12px}
.month-title{font-size:16px;font-weight:600}
.nav-btn{width:32px;height:32px;border:none;background:var(--bg);border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text)}
.toggle-bar{display:flex;background:var(--bg);border-radius:8px;padding:3px;margin:12px 16px;gap:2px}
.toggle-btn{flex:1;padding:7px 4px;border:none;background:transparent;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;color:var(--sub);white-space:nowrap}
.toggle-btn.active{background:var(--card);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08)}

.legend{display:flex;flex-wrap:wrap;gap:6px 10px;padding:0 16px 10px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--sub)}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ====== CALENDAR VIEW ====== */
.calendar-view{display:block;padding:0 12px}
.calendar-view.hidden{display:none}
.weekday-row{display:grid;grid-template-columns:repeat(5,1fr);text-align:center;font-size:11px;color:var(--sub);padding:8px 4px}
.day-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:3px}
.day-cell{display:flex;flex-direction:column;align-items:stretch;justify-content:flex-start;padding:1px 2px;border-radius:6px;cursor:pointer;font-size:12px;min-height:52px;box-sizing:border-box}
.day-cell.today{background:#E3F2FD}
.day-cell.other-month{visibility:hidden}
.day-cell .day-num{line-height:1;font-size:12px;font-weight:600;padding:1px 0 2px}
.day-cell.today .day-num{color:#1565C0}
.day-cell .stock-mini{display:block;font-size:8px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-radius:3px;padding:1px 3px;color:#FFF;margin-bottom:1px;box-sizing:border-box;width:100%}
.day-cell .stock-more{font-size:7.5px;color:var(--sub);margin-top:0}

/* ====== LIST VIEW ====== */
.list-view{display:none;padding:0 16px 20px}
.list-view.active{display:block}
.ipo-card{background:var(--card);border-radius:10px;padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.ipo-card .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.ipo-card .stock-name{font-size:15px;font-weight:600}
.ipo-card .stock-code{font-size:11px;color:var(--sub)}
.status-badge{font-size:11px;padding:3px 8px;border-radius:10px;font-weight:500}
.status-subscribing{background:#FFF3E0;color:#E65100}
.status-upcoming{background:#E8F5E9;color:#2E7D32}
.status-listed{background:#F5F5F5;color:#757575}
.timeline{display:flex;flex-direction:column;gap:6px}
.timeline-item{display:flex;align-items:center;gap:8px;font-size:12px}
.timeline-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.timeline-label{color:var(--sub);min-width:52px}
.timeline-date{font-weight:500}
.price-tag{font-size:11px;color:var(--sub);margin-top:2px}

.filter-row{display:flex;gap:6px;padding:0 0 12px;overflow-x:auto}
.filter-chip{padding:5px 12px;border-radius:14px;border:1px solid var(--border);font-size:12px;cursor:pointer;white-space:nowrap;background:var(--card);color:var(--sub)}
.filter-chip.active{background:var(--blue);color:#fff;border-color:var(--blue)}

.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:100;justify-content:center;align-items:flex-end}
.modal-overlay.show{display:flex}
.modal-sheet{background:var(--card);border-radius:16px 16px 0 0;padding:20px 16px 24px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto}
.close-bar{width:36px;height:4px;background:#D0D0D0;border-radius:2px;margin:0 auto 16px;cursor:pointer}
.modal-sheet h3{font-size:17px;margin-bottom:4px}
.modal-sheet .code{font-size:12px;color:var(--sub);margin-bottom:12px}
.event-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;margin-bottom:6px;font-size:14px}
.event-dot{width:10px;height:10px;border-radius:50%}
.event-label{color:var(--sub);min-width:54px}
.event-date{font-weight:600}
.event-wday{font-size:12px;color:var(--sub);margin-left:auto}

.empty-state{text-align:center;padding:40px 20px;color:var(--sub);font-size:14px}
.footer{text-align:center;padding:24px 16px;font-size:11px;color:#BDBBD}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <h1>📅 港股打新日历</h1>
      <div class="sub">IPO 关键日期一览 · 数据来源 AAStocks</div>
    </div>
    <img src="avatar.jpg" alt="avatar" class="avatar">
  </div>

  <div class="nav-row" id="calNav">
    <button class="nav-btn" onclick="prevMonth()">◀</button>
    <span class="month-title" id="monthTitle"></span>
    <button class="nav-btn" onclick="nextMonth()">▶</button>
  </div>

</div>

<div class="toggle-bar">
  <button class="toggle-btn active" onclick="switchView('calendar')">📅 月视图</button>
  <button class="toggle-btn" onclick="switchView('list')">📋 列表</button>
</div>

<div class="legend">
  <div class="legend-item"><span class="legend-dot" style="background:var(--red)"></span> 上市首日</div>
  <div class="legend-item"><span class="legend-dot" style="background:var(--blue)"></span> 招股开始</div>
  <div class="legend-item"><span class="legend-dot" style="background:var(--orange)"></span> 截止招股</div>
  <div class="legend-item"><span class="legend-dot" style="background:var(--purple)"></span> 公布中签</div>
  <div class="legend-item"><span class="legend-dot" style="background:var(--gray)"></span> 暗盘日</div>
</div>

<div class="calendar-view" id="calendarView">
  <div class="calendar">
    <div class="weekday-row"><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span></div>
    <div class="day-grid" id="dayGrid"></div>
  </div>
</div>

<div class="list-view" id="listView">
  <div class="filter-row" id="filterRow">
    <span class="filter-chip active" onclick="filterList('all',this)">全部</span>
    <span class="filter-chip" onclick="filterList('subscribing',this)">招股中</span>
    <span class="filter-chip" onclick="filterList('upcoming',this)">即将上市</span>
    <span class="filter-chip" onclick="filterList('listed',this)">已上市</span>
  </div>
  <div id="listContainer"></div>
</div>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="close-bar" onclick="document.getElementById('modal').classList.remove('show')"></div>
    <div id="modalContent"></div>
  </div>
</div>

<div class="footer">数据仅供参考 · 不构成投资建议 · 更新 2026-07-06</div>

const WDAYS=['日','一','二','三','四','五','六'];
const BADGE_MAP={listing_date:'首',sub_start_date:'招',sub_end_date:'止',sub_period:'招',allotment_date:'中',grey_market_date:'暗'};

let currentYear=2026,currentMonth=7,currentView='calendar',currentFilter='all';

function fmt(y,m,d){return y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0');}
function parseYMD(s){const[a,b,c]=s.split('-');return new Date(+a,+b-1,+c);}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}

function eventsMap(){
  const m={};
  IPO_DATA.forEach(function(ipo){
    ipo.events.forEach(function(ev){
      if(!m[ev.date]) m[ev.date]=[];
      m[ev.date].push({name:ev.stock_name||ipo.stock_name,code:ev.stock_code||ipo.stock_code,price:ev.price_range||ipo.price_range,status:ev.status_label||ipo.status_label,type:ev.type,label:ev.label,color:ev.color,date:ev.date,is_ah:ipo.is_ah});
    });
  });
  // Fill subscription period intermediate dates
  IPO_DATA.forEach(function(ipo){
    var subStart=null, subEnd=null;
    ipo.events.forEach(function(ev){
      if(ev.type==='sub_start_date') subStart=ev;
      if(ev.type==='sub_end_date') subEnd=ev;
    });
    if(!subStart || !subEnd) return;
    var sd=parseYMD(subStart.date);
    var ed=parseYMD(subEnd.date);
    var cur=new Date(sd);
    cur.setDate(cur.getDate()+1);
    while(cur < ed){
      var dow=cur.getDay();
      if(dow!==0 && dow!==6){
        var dStr=fmt(cur.getFullYear(),cur.getMonth()+1,cur.getDate());
        if(!m[dStr]) m[dStr]=[];
        m[dStr].push({
          name:subStart.stock_name||ipo.stock_name,
          code:subStart.stock_code||ipo.stock_code,
          price:subStart.price_range||ipo.price_range,
          status:ipo.status_label,
          type:'sub_period',
          label:'招股中',
          color:subStart.color,
          date:dStr,
          is_ah:ipo.is_ah
        });
      }
      cur.setDate(cur.getDate()+1);
    }
  });
  return m;
}

// ========== CALENDAR (Mon-Fri only, 5 columns) ==========
function renderCalendar(){
  document.getElementById('monthTitle').textContent=currentYear+'年'+currentMonth+'月';
  const grid=document.getElementById('dayGrid');
  const today=new Date();
  const todayStr=fmt(today.getFullYear(),today.getMonth()+1,today.getDate());
  const evMap=eventsMap();

  const firstDay=new Date(currentYear,currentMonth-1,1);
  const lastDay=new Date(currentYear,currentMonth,0);
  const totalDays=lastDay.getDate();
  const firstDow=firstDay.getDay(); // 0=Sun, 1=Mon, ... 6=Sat

  let h='', col=0;

  // leading empty cells — fill columns before the first weekday of month
  if(firstDow>=1 && firstDow<=5){
    for(let i=0;i<firstDow-1;i++){ h+='<div class="day-cell other-month"></div>'; col++; }
  }

  // month days, skip Sat(6)/Sun(0)
  for(let d=1;d<=totalDays;d++){
    const dt=new Date(currentYear,currentMonth-1,d);
    const dow=dt.getDay();
    if(dow===0||dow===6) continue;

    const ymd=fmt(currentYear,currentMonth,d);
    const evts=evMap[ymd]||[];
    const isToday=ymd===todayStr;
    let stockHtml='';
    evts.slice(0,2).forEach(function(e){
      var badge=BADGE_MAP[e.type]||'';
      stockHtml+='<div class="stock-mini" style="background:'+e.color+'">'+badge+'-'+e.name+'</div>';
    });
    if(evts.length>2) stockHtml+=`<div class="stock-more">+${evts.length-2}家</div>`;
    const cellcls=isToday?' day-cell today':'day-cell';
    h+=`<div class="${cellcls}" data-date="${ymd}" onclick="openDay(this.dataset.date)"><div class="day-num">${d}</div>${stockHtml}</div>`;
    col++; if(col>=5) col=0;
  }

  // pad trailing empty cells to fill last row
  if(col>0){ for(let i=col;i<5;i++) h+=`<div class="day-cell other-month"></div>`; }

  grid.innerHTML=h;
}

// ========== LIST ==========
function renderList(){
  const c=document.getElementById('listContainer');
  let items=IPO_DATA.slice();
  if(currentFilter!=='all') items=items.filter(function(i){return i.status===currentFilter;});
  if(!items.length){c.innerHTML='<div class="empty-state">📭 暂无数据</div>';return;}
  let h='';
  items.forEach(function(ipo){
    const sc='status-'+ipo.status;
    h+=`<div class="ipo-card" onclick="openDay('${ipo.listing_date}')">
      <div class="card-header"><div><div class="stock-name">${ipo.stock_name}</div>
      <div class="stock-code">${ipo.stock_code}${ipo.is_ah?' (A+H)':''}</div></div>
      <span class="status-badge ${sc}">${ipo.status_label}</span></div><div class="timeline">`;
    ipo.events.slice().sort(function(a,b){var o={listing_date:5,sub_start_date:1,sub_end_date:2,allotment_date:3,grey_market_date:4};return(o[a.type]||0)-(o[b.type]||0);}).forEach(function(ev){
      h+=`<div class="timeline-item"><span class="timeline-dot" style="background:${ev.color}"></span><span class="timeline-label">${ev.label}</span><span class="timeline-date">${ev.date}</span></div>`;
    });
    if(ipo.price_range) h+=`<div class="price-tag">发行价: $${ipo.price_range} HKD</div>`;
    h+='</div></div>';
  });
  c.innerHTML=h;
}

function filterList(st,el){
  currentFilter=st;
  document.querySelectorAll('.filter-chip').forEach(function(c){c.classList.remove('active');});
  el.classList.add('active');
  renderList();
}

// ========== MODAL ==========
function openDay(ymd){
  var evts=(eventsMap()[ymd])||[];
  if(!evts.length)return;
  var dt=new Date(ymd);
  var h='<h3>'+ymd+' 星期'+WDAYS[dt.getDay()]+'</h3>';
  h+='<div class="code">'+evts.length+' 只新股有动态</div>';
  var bs={};
  evts.forEach(function(e){
    if(!bs[e.code]) bs[e.code]={n:e.name,c:e.code,p:e.price,ev:[],ah:e.is_ah};
    bs[e.code].ev.push(e);
  });
  Object.keys(bs).forEach(function(k){
    var s=bs[k];
    h+='<div style="margin-top:12px;font-weight:600;font-size:14px">'+s.n+
      ' <span style="font-weight:400;font-size:11px;color:var(--sub)">'+s.c+(s.ah?' (A+H)':'')+'</span></div>';
    s.ev.sort(function(a,b){var o={listing_date:5,sub_start_date:1,sub_end_date:2,allotment_date:3,grey_market_date:4};return(o[a.type]||0)-(o[b.type]||0);});
    s.ev.forEach(function(ev){
      var ed=new Date(ev.date);
      h+='<div class="event-row"><span class="event-dot" style="background:'+ev.color+'"></span>'+
        '<span class="event-label">'+ev.label+'</span><span class="event-date">'+ev.date+'</span>'+
        '<span class="event-wday">周'+WDAYS[ed.getDay()]+'</span></div>';
    });
    if(s.p) h+='<div class="price-tag" style="margin-left:20px">发行价: $'+s.p+' HKD</div>';
  });
  document.getElementById('modalContent').innerHTML=h;
  document.getElementById('modal').classList.add('show');
}
function closeModal(e){if(e.target.id==='modal'||e.target.classList.contains('modal-overlay'))document.getElementById('modal').classList.remove('show');}

// ========== SWITCH ==========
function switchView(view){
  currentView=view;
  document.querySelectorAll('.toggle-btn').forEach(function(b){b.classList.remove('active');});
  event.target.classList.add('active');

  document.getElementById('calendarView').classList.toggle('hidden',view!=='calendar');
  document.getElementById('listView').classList.toggle('active',view==='list');

  document.getElementById('calNav').style.display=view==='calendar'?'flex':'none';

  if(view==='calendar') renderCalendar();
  else if(view==='list') renderList();
}

function prevMonth(){currentMonth--;if(currentMonth<1){currentMonth=12;currentYear--;}renderCalendar();}
function nextMonth(){currentMonth++;if(currentMonth>12){currentMonth=1;currentYear++;}renderCalendar();}

// INIT
renderCalendar();

</script>
